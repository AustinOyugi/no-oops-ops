name: lango

image:
  repository: lango-service

service:
  internal_port: 8080

healthcheck:
  test:
    - CMD
    - curl
    - -f
    - http://localhost:8080/lango/liveness
  start_period: 60s
  interval: 10s
  timeout: 10s
  retries: 3

env:
  shared:
    SERVER_PORT: "8080"
    SPRING_PROFILES_ACTIVE: prod
  environments:
    prod:
      ENVIRONMENT: prod
